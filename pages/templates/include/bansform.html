{{define "bansform"}}<DIV class="card" id="bansform">
	<H2>Ban List</H2>
	<FORM action="/admin/unbanid" method="post">
		<TABLE>
			<TR class="label">
				<TD>IP</TD>
				<TD>Reason</TD>
				<TD>When</TD>
				<TD>Unban</TD>
			</TR>
			{{range $id, $poster := .}}<TR>
				<TD>{{$id}}</TD>
				<TD>{{with $poster.BanReason}}{{.}}{{else}}None{{end}}</TD>
				<TD title="{{$poster.BanTime.Format "2006-01-02 15:04:05"}}">{{timeago $poster.BanTime}}</TD>
				<TD><input type="checkbox" name="id" value="{{$id}}"></TD>
			</TR>{{end}}
			<TR>
				<TD colspan="4"><INPUT type="submit" value="Submit" id="submit"></TD>
			</TR>
		</TABLE>
	</FORM>
</DIV>{{end}}
